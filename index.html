<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACI Institute</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg">
  <script>
    /* Set the language before first paint so the CJK font stack applies
       immediately for returning Chinese visitors, avoiding a swap flash. */
    (function () {
      try {
        var l = localStorage.getItem("aci-lang");
        if (l !== "en" && l !== "zh") {
          l = (navigator.language || "").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
        }
        document.documentElement.lang = l === "zh" ? "zh-Hans" : "en";
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono&display=swap">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
  <main id="main" class="wrap shell-preview">
    <p class="eyebrow" data-i18n="preview.eyebrow">Design system preview</p>
    <h1 class="display" data-i18n="preview.title">The shell is in place.</h1>
    <p class="lead" data-i18n="preview.body">Header, footer, colors, type, and the bilingual scaffolding are live. Pages come next.</p>
    <div class="swatches" aria-hidden="true">
      <span class="swatch ee">Extended Engagement</span>
      <span class="swatch aa">Aesthetic Awareness</span>
      <span class="swatch ac">Adaptive Coherence</span>
      <span class="swatch ei">Expressive Influence</span>
    </div>
    <noscript>
      <p class="lead">This site uses JavaScript for navigation and language switching.
      Please enable it, or visit <a href="/gauge/">the ACI Gauge</a> directly.</p>
    </noscript>
  </main>

  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/shell.js"></script>
</body>
</html>
